<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sánh Nhà Cung Cấp</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7fc;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #4a90e2;
            font-size: 2.5rem;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            font-size: 1rem;
            color: white;
            background-color: #4a90e2;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .back-button:hover {
            background-color: #357abd;
        }

        .chart-container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .chart {
            flex: 1;
            min-width: 300px;
            max-width: 600px;
        }

        .recommendation {
            margin-top: 30px;
            padding: 20px;
            background-color: #e8f4fc;
            border-left: 5px solid #4a90e2;
            border-radius: 5px;
        }

        .recommendation h2 {
            color: #4a90e2;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="#" class="back-button">← Quay lại</a>
        <h1>So Sánh Nhà Cung Cấp</h1>

        <div class="chart-container">
            <div class="chart">
                <canvas id="radarChart"></canvas>
            </div>
            <div class="chart">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="recommendation">
            <h2>Gợi Ý Lựa Chọn:</h2>
            <p id="recommendationText">Dựa trên tiêu chí ưu tiên, nhà cung cấp phù hợp nhất là <b>Công Ty A</b>.</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Radar Chart Data
            const radarData = {
                labels: ['Giá cả', 'Độ tin cậy', 'Phạm vi bảo hiểm', 'Hỗ trợ khách hàng'],
                datasets: [
                    {
                        label: 'Công Ty A',
                        data: [3, 4, 2, 5],
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    },
                    {
                        label: 'Công Ty B',
                        data: [4, 3, 5, 2],
                        backgroundColor: 'rgba(255, 99, 132, 0.2)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1
                    }
                ]
            };

            // Radar Chart Config
            const radarConfig = {
                type: 'radar',
                data: radarData,
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top'
                        }
                    }
                }
            };

            // Render Radar Chart
            const radarCtx = document.getElementById('radarChart').getContext('2d');
            new Chart(radarCtx, radarConfig);

            // Bar Chart Data
            const barData = {
                labels: ['Giá cả', 'Độ tin cậy', 'Phạm vi bảo hiểm', 'Hỗ trợ khách hàng'],
                datasets: [
                    {
                        label: 'Công Ty A',
                        data: [3, 4, 2, 5],
                        backgroundColor: 'rgba(75, 192, 192, 0.5)'
                    },
                    {
                        label: 'Công Ty B',
                        data: [4, 3, 5, 2],
                        backgroundColor: 'rgba(255, 99, 132, 0.5)'
                    }
                ]
            };

            // Bar Chart Config
            const barConfig = {
                type: 'bar',
                data: barData,
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            };

            // Render Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            new Chart(barCtx, barConfig);
        });
    </script>
</body>
</html>
