<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Hệ Thống</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7fc;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #4a90e2;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .report-options {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 10px;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #4a90e2;
            color: white;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        .icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Báo Cáo Hệ Thống</h1>
        <div class="report-options">
            <button onclick="exportFile()"><i class="fas fa-file-download icon"></i>Xuất Báo Cáo</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nhà Cung Cấp</th>
                    <th>Tiêu Chí</th>
                    <th>Kết Quả</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Nhà Cung Cấp A</td>
                    <td>Giá Cả</td>
                    <td>8.5</td>
                </tr>
                <tr>
                    <td>Nhà Cung Cấp B</td>
                    <td>Phạm Vi Bảo Hiểm</td>
                    <td>9.0</td>
                </tr>
            </tbody>
        </table>
        <a href="#" class="back-btn"><i class="fas fa-arrow-left icon"></i>Quay Lại</a>
    </div>

    <script>
        function exportFile() {
            alert('Xuất báo cáo thành công (tích hợp logic thực tế tại đây).');
            // Tích hợp logic xuất file PDF hoặc Excel tại đây
        }
    </script>
</body>
</html>
