<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Xu Hướng Thị Trường</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #4a90e2;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            margin: 20px auto;
            width: 80%;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 20px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            transition: background 0.3s, transform 0.2s;
        }

        .back-btn:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        .icon {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Phân Tích Xu Hướng Thị Trường</h1>
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
        <button id="exportBtn"><i class="fas fa-download icon"></i>Xuất Báo Cáo</button>
        <a href="#" class="back-btn"><i class="fas fa-arrow-left icon"></i>Quay Lại</a>
    </div>

    <script>
        // Dữ liệu mẫu cho biểu đồ xu hướng
        const data = {
            labels: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5'],
            datasets: [
                {
                    label: 'Giá Cả',
                    data: [10, 15, 20, 25, 30],
                    borderColor: '#4a90e2',
                    backgroundColor: 'rgba(74, 144, 226, 0.2)',
                    fill: true,
                },
                {
                    label: 'Độ Tin Cậy',
                    data: [8, 12, 15, 22, 28],
                    borderColor: '#f39c12',
                    backgroundColor: 'rgba(243, 156, 18, 0.2)',
                    fill: true,
                }
            ]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: ${context.raw}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Thời Gian'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Giá Trị'
                        }
                    }
                }
            }
        };

        const trendChart = new Chart(
            document.getElementById('trendChart'),
            config
        );

        document.getElementById('exportBtn').addEventListener('click', function() {
            alert('Xuất báo cáo thành công!');
            // Thêm logic xuất file PDF hoặc Excel ở đây
        });
    </script>
</body>
</html>
