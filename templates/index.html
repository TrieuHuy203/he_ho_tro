<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Dữ liệu bảo hiểm theo vùng</h1>
        <table class="table table-bordered mt-4">
            <thead>
                <tr>
                    <th>Trường</th>
                    <th>Mức lương tối thiểu</th>
                    <th>Chi phí BHYT</th>
                    <th>Chi phí BHXH</th>
                    <th>Tổng chi phí</th>
                </tr>
            </thead>
            <tbody>
                {% for region in regions %}
                <tr>
                    <td>{{ region.name }}</td>
                    <td>{{ region.min_salary }}</td>
                    <td>{{ region.bhyt_cost }}</td>
                    <td>{{ region.bhxh_cost }}</td>
                    <td>{{ region.total_cost }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="text-center">
            <a href="/ahp" class="btn btn-primary">Tính AHP để chọn vùng tốt nhất</a>
        </div>
    </div>
</body>
</html>
